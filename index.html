<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интернет-магазин // Интернет-магазин</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --brand-primary: #0f172a;
            --brand-accent: #4f46e5;
            --brand-accent-hover: #4338ca;
            --bg-global: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.9);
            --border-light: rgba(226, 232, 240, 0.8);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --font-premium: 'Plus Jakarta Sans', sans-serif;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-premium: 24px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-premium); -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-global); color: var(--text-dark); padding-top: 110px; overflow-x: hidden; }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ АДМИНА --- */
        .admin-toggle-bar {
            background: var(--brand-primary); color: white; padding: 0.6rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; position: fixed; top: 0; left: 0; width: 100%; z-index: 1200;
        }
        .switch-container { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- ХЕДЕР С КОРЗИНОЙ --- */
        header {
            position: fixed; top: 34px; left: 0; width: 100%; background: var(--bg-surface);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light); padding: 1.25rem 2rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .brand-logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.04em; color: var(--text-dark); text-decoration: none; }
        
        .header-actions { display: flex; align-items: center; gap: 1.5rem; }
        .cart-trigger {
            background: #ffffff; border: 1px solid var(--border-light); padding: 0.6rem 1.2rem;
            border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;
            position: relative; transition: var(--transition);
        }
        .cart-trigger:hover { border-color: var(--brand-accent); }
        .cart-counter { background: var(--brand-accent); color: white; font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 6px; }

        /* --- ОКНО С АКЦИЯМИ --- */
        .promo-section { margin-bottom: 2.5rem; }
        .promo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        .promo-card {
            background: #6366f1; color: white;
            padding: 1.75rem; border-radius: var(--radius-premium); position: relative;
            overflow: hidden; display: flex; flex-direction: column; justify-content: flex-start; min-height: 160px;
            box-shadow: var(--shadow-lg); cursor: pointer; transition: var(--transition);
        }
        .promo-card:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .promo-card .promo-img-holder { position: absolute; right: 0; bottom: 0; width: 45%; height: 75%; overflow: hidden; display: flex; align-items: flex-end; justify-content: flex-end; }
        .promo-card img { width: 100%; height: 100%; object-fit: cover; border-top-left-radius: 12px; }
        .promo-tag { background: rgba(255,255,255,0.25); padding: 0.3rem 0.75rem; border-radius: 8px; font-size: 0.75rem; align-self: flex-start; text-transform: uppercase; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: 0.05em; }
        .promo-title { font-size: 1.4rem; font-weight: 700; line-height: 1.2; max-width: 60%; word-wrap: break-word; }
        .promo-delete-btn { position: absolute; top: 0.75rem; right: 0.75rem; background: rgba(255,255,255,0.3); border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-weight: bold; z-index: 10; }
        .promo-delete-btn:hover { background: #ef4444; }

        /* --- КОНТЕНТ --- */
        .wrapper { max-width: 1300px; margin: 2rem auto 6rem; padding: 0 2rem; }
        
        .admin-panel { background: #ffffff; border: 1px dashed var(--brand-accent); border-radius: var(--radius-premium); padding: 2rem; margin-bottom: 3rem; display: none; box-shadow: var(--shadow-lg); }
        .admin-section-title { font-size: 1.1rem; font-weight: 700; margin: 1.5rem 0 0.75rem 0; padding-top: 1rem; border-top: 1px solid #f1f5f9; color: var(--brand-accent); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 0.9rem; outline: none; }
        .file-upload-btn { display: block; text-align: center; background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 0.70rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); }
        .btn { background: var(--brand-accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn:hover { background: var(--brand-accent-hover); }

        /* --- КАТЕГОРИИ И КАРТОЧКИ --- */
        .categories-container { display: flex; gap: 1rem; margin-bottom: 2.5rem; overflow-x: auto; padding-bottom: 0.5rem; align-items: center; -webkit-overflow-scrolling: touch; }
        .categories-container::-webkit-scrollbar { display: none; }
        .category-tab { background: #ffffff; border: 1px solid var(--border-light); padding: 0.6rem 1.2rem; border-radius: 100px; font-size: 0.9rem; font-weight: 500; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.5rem; }
        .category-tab.active { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
        .delete-cat-btn { display: none; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 0.65rem; cursor: pointer; align-items: center; justify-content: center; font-weight: bold; }
        
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: #ffffff; border: 1px solid var(--border-light); border-radius: var(--radius-premium); padding: 1.25rem; transition: var(--transition); position: relative; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .product-preview-box { width: 100%; height: 220px; background: #f1f5f9; border-radius: 12px; margin-bottom: 1rem; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .product-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .no-image-placeholder { font-size: 2.5rem; color: #94a3b8; }
        .product-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .product-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; flex-grow: 1; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .product-price { font-size: 1.25rem; font-weight: 700; white-space: nowrap; }
        .card-admin-actions { position: absolute; top: 0.5rem; right: 0.5rem; display: none; gap: 0.5rem; z-index: 10; }
        .btn-action { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        /* --- СЛАЙД-ПАНЕЛЬ КОРЗИНЫ --- */
        .cart-drawer { position: fixed; top: 0; right: -400px; width: 100%; max-width: 400px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 1500; transition: var(--transition); display: flex; flex-direction: column; padding: 2rem; }
        .cart-drawer.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9; }
        .cart-item-info h5 { font-size: 0.95rem; font-weight: 600; }
        .cart-item-info span { font-size: 0.85rem; color: var(--brand-accent); font-weight: 700; }
        .cart-item-qty { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn { width: 28px; height: 28px; background: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .cart-footer { padding-top: 1.5rem; border-top: 1px solid #e2e8f0; margin-top: auto; }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }

        /* Фоновые шторки */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.3); backdrop-filter: blur(4px); z-index: 1400; display: none; }

        /* МОДАЛЬНОЕ ОКНО ОПИСАНИЯ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; padding: 1rem; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-container { background: #ffffff; width: 100%; max-width: 850px; border-radius: 24px; overflow: hidden; position: relative; transform: scale(0.95); transition: var(--transition); display: grid; grid-template-columns: 1fr 1fr; max-height: 90vh; }
        .modal-overlay.active .modal-container { transform: scale(1); }
        .modal-close-btn { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; background: #f1f5f9; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .modal-image-side { background: #f8fafc; display: flex; justify-content: center; align-items: center; padding: 2rem; overflow: hidden; }
        .modal-image-side img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        .modal-info-side { padding: 2.5rem; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-category-badge { align-self: flex-start; background: #eef2ff; color: var(--brand-accent); font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 100px; margin-bottom: 1rem; }
        .modal-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
        .modal-price { font-size: 1.5rem; font-weight: 800; color: var(--brand-accent); margin-bottom: 1.5rem; }
        .modal-full-desc { font-size: 0.95rem; color: #475569; line-height: 1.6; margin-bottom: 2rem; }

        [contenteditable="true"] { outline: 2px dashed var(--brand-accent); background: rgba(79, 70, 229, 0.05); padding: 2px; }

        /* ==========================================================================
           МЕДИА-ЗАПРОСЫ (АДАПТАЦИЯ ПОД МОБИЛЬНЫЕ СМАРТФОНЫ И ПЛАНШЕТЫ)
           ========================================================================== */
        @media (max-width: 768px) {
            body { padding-top: 140px; } /* Увеличиваем отступ сверху, так как админка на телефонах шире */
            
            .admin-toggle-bar { padding: 0.5rem 1rem; flex-direction: column; gap: 0.25rem; text-align: center; }
            header { top: 52px; padding: 1rem; }
            .brand-logo { font-size: 1.3rem; }
            .cart-trigger { padding: 0.5rem 0.8rem; font-size: 0.85rem; }
            
            .wrapper { padding: 0 1rem; margin-top: 1.5rem; }
            
            /* Сетки перестраиваются */
            .promo-container { grid-template-columns: 1fr; gap: 1rem; }
            .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
            .product-card { padding: 1rem; }
            .product-preview-box { height: 180px; }

            /* Корзина открывается на весь экран */
            .cart-drawer { max-width: 100%; right: -100%; padding: 1.5rem; }
            .cart-drawer.active { right: 0; }

            /* Адаптация модального окна в одну колонку вертикально */
            .modal-container { grid-template-columns: 1fr; max-height: 85vh; overflow-y: auto; }
            .modal-image-side { height: 220px; padding: 1rem; margin-top: 2rem; }
            .modal-info-side { padding: 1.5rem; overflow-y: visible; }
            .modal-title { font-size: 1.3rem; }
            .modal-price { margin-bottom: 1rem; font-size: 1.3rem; }
            .modal-full-desc { margin-bottom: 1.5rem; font-size: 0.9rem; }
            
            /* Формы админки */
            .form-grid { grid-template-columns: 1fr; gap: 0.75rem; }
        }

        @media (max-width: 480px) {
            /* Совсем маленькие экраны смартфонов */
            .catalog-grid { grid-template-columns: 1fr; }
            .product-meta { flex-direction: row; align-items: center; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="admin-toggle-bar">
        <div>// Панель оператора</div>
        <div class="switch-container">
            <span>Режим Администратора</span>
            <label class="switch">
                <input type="checkbox" id="adminToggle" onchange="toggleAdminMode(this.checked)">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <header>
        <a href="#" class="brand-logo">Интернет-магазин</a>
        <div class="header-actions">
            <button class="cart-trigger" onclick="toggleCart(true)">
                🛒 Корзина <span class="cart-counter" id="cartCounter">0</span>
            </button>
        </div>
    </header>

    <main class="wrapper">

        <section class="promo-section">
            <div class="promo-container" id="promoBox">
                </div>
        </section>

        <section class="admin-panel" id="adminPanel">
            <h3>🎛 Быстрое добавление нового продукта</h3>
            <div class="form-grid">
                <div class="form-group"><input type="text" id="newProdName" placeholder="Название товара"></div>
                <div class="form-group"><input type="text" id="newProdDesc" placeholder="Краткое описание"></div>
                <div class="form-group"><input type="text" id="newProdPrice" placeholder="Цена (например: 150000)" oninput="formatPriceInput(this)"></div>
                <div class="form-group"><select id="newProdCat"></select></div>
                <div class="form-group">
                    <label class="file-upload-btn">📷 Фото товара
                        <input type="file" id="newProdImage" accept="image/*" style="display: none;" onchange="handleFileSelect(this, 'product')">
                    </label>
                    <div id="fileStatus" style="font-size: 0.75rem; color: var(--brand-accent); text-align: center;"></div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <textarea id="newProdFullDesc" style="height: 60px;" placeholder="Полное описание товара для модального окна..."></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <button class="btn" onclick="addNewProduct()">Опубликовать на витрине</button>
                <button class="btn" style="background:#e2e8f0; color:var(--text-dark);" onclick="addNewCategoryPrompt()">+ Создать категорию</button>
            </div>

            <h3 class="admin-section-title">🔥 Управление рекламными акциями</h3>
            <div class="form-grid">
                <div class="form-group"><input type="text" id="newPromoTitle" placeholder="Заголовок акции (например: iPhone 17 PRO MAX)"></div>
                <div class="form-group"><input type="text" id="newPromoTag" placeholder="Тег (например: Акция 10%)"></div>
                <div class="form-group">
                    <label class="file-upload-btn">🖼 Фото/Силуэт для акции
                        <input type="file" id="newPromoImage" accept="image/*" style="display: none;" onchange="handleFileSelect(this, 'promo')">
                    </label>
                    <div id="promoFileStatus" style="font-size: 0.75rem; color: var(--brand-accent); text-align: center;"></div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <textarea id="newPromoFullDesc" style="height: 60px;" placeholder="Полное описание условий акции, которое откроется при нажатии..."></textarea>
            </div>
            <button class="btn" style="background: #7c3aed;" onclick="addNewPromo()">Запустить акцию</button>
        </section>

        <section class="categories-container" id="categoriesBox"></section>

        <section class="catalog-grid" id="catalogBox"></section>
    </main>

    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleCart(false)"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>Ваша корзина</h3>
            <button class="qty-btn" onclick="toggleCart(false)">✕</button>
        </div>
        <div class="cart-items-list" id="cartItemsContainer">
            </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Итого к выбору:</span>
                <span id="cartTotalSum">0 ₸</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-container">
            <button class="modal-close-btn" onclick="document.getElementById('productModal').classList.remove('active')">✕</button>
            <div class="modal-image-side" id="modalImageContainer"></div>
            <div class="modal-info-side">
                <div class="modal-category-badge" id="modalCategory">Категория</div>
                <h2 class="modal-title" id="modalTitle">Название решения</h2>
                <div class="modal-price" id="modalPrice">0 ₸</div>
                <div class="modal-full-desc" id="modalFullDesc">Детальное описание.</div>
                <button class="btn" id="modalAddToCartBtn" style="width: 100%; margin-top: auto;">Добавить в корзину</button>
            </div>
        </div>
    </div>

    <script>
        const defaultCategories = ["Все решения", "Смартфоны", "Ноутбуки"];
        const defaultProducts = [
            { id: 1, name: "iPhone 15 Pro Max", desc: "Флагманский смартфон с титановым корпусом.", fullDesc: "Оснащен чипом A17 Pro, передовой системой камер 48 Мп и невероятным экраном Super Retina XDR.", price: "650 000 ₸", category: "Смартфоны", image: "" }
        ];
        const defaultPromos = [
            { id: 1, title: "iPhone 17 PRO MAX", tag: "АКЦИЯ 10%", fullDesc: "Уникальное предложение на предзаказ новейшего поколения iPhone 17 Pro Max. Официальная гарантия, рассрочка Kaspi на 24 месяца и гарантированные подарки первым покупателям!", image: "" }
        ];

        let categories = JSON.parse(localStorage.getItem('alash_categories')) || defaultCategories;
        let products = JSON.parse(localStorage.getItem('alash_products')) || defaultProducts;
        let promos = JSON.parse(localStorage.getItem('alash_promos')) || defaultPromos;
        let cart = JSON.parse(localStorage.getItem('alash_cart')) || [];
        
        let currentFilter = "Все решения";
        let isEditMode = false;
        let tempProductImage = "";
        let tempPromoImage = "";
        let currentlyOpenedProductId = null;

        function saveData() {
            localStorage.setItem('alash_categories', JSON.stringify(categories));
            localStorage.setItem('alash_products', JSON.stringify(products));
            localStorage.setItem('alash_promos', JSON.stringify(promos));
            localStorage.setItem('alash_cart', JSON.stringify(cart));
        }

        function formatNumberToKZT(value) {
            let digits = value.replace(/\D/g, "");
            if (!digits) return "";
            return new Intl.NumberFormat('ru-RU').format(digits) + " ₸";
        }

        function formatPriceInput(input) {
            input.value = formatNumberToKZT(input.value);
        }

        function toggleAdminMode(isChecked) {
            isEditMode = isChecked;
            document.getElementById('adminPanel').style.display = isChecked ? 'block' : 'none';
            document.querySelectorAll('.card-admin-actions, .promo-delete-btn, .delete-cat-btn').forEach(el => el.style.display = isChecked ? 'inline-flex' : 'none');
            document.querySelectorAll('.product-title, .product-desc, .product-price').forEach(el => el.contentEditable = isChecked);
            if (document.getElementById('modalFullDesc')) document.getElementById('modalFullDesc').contentEditable = isChecked;
        }

        function handleFileSelect(input, target) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                if(target === 'product') {
                    tempProductImage = e.target.result;
                    document.getElementById('fileStatus').innerText = "✓ Картинка готова";
                } else {
                    tempPromoImage = e.target.result;
                    document.getElementById('promoFileStatus').innerText = "✓ Баннер готов";
                }
            };
            reader.readAsDataURL(file);
        }

        /* --- ЛОГИКА КОРЗИНЫ --- */
        function toggleCart(open) {
            document.getElementById('cartDrawer').classList.toggle('active', open);
            document.getElementById('drawerOverlay').style.display = open ? 'block' : 'none';
            if(open) renderCart();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if(!product) return;
            
            const cartItem = cart.find(item => item.id === productId);
            if(cartItem) {
                cartItem.qty++;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
            }
            saveData();
            updateCartCounter();
        }

        function changeQty(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== productId);
                saveData();
                renderCart();
                updateCartCounter();
            }
        }

        function updateCartCounter() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCounter').innerText = count;
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                let priceNum = parseInt(item.price.replace(/\D/g, '')) || 0;
                total += priceNum * item.qty;

                const el = document.createElement('div');
                el.className = 'cart-item';
                el.innerHTML = `
                    <div class="cart-item-info">
                        <h5>${item.name}</h5>
                        <span>${item.price}</span>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                    </div>
                `;
                container.appendChild(el);
            });

            document.getElementById('cartTotalSum').innerText = new Intl.NumberFormat('ru-RU').format(total) + " ₸";
        }

        /* --- УПРАВЛЕНИЕ И КЛИК ПО АКЦИЯМ --- */
        function renderPromos() {
            const container = document.getElementById('promoBox');
            container.innerHTML = '';
            
            promos.forEach(promo => {
                const card = document.createElement('div');
                card.className = 'promo-card';
                
                card.onclick = (e) => {
                    if(!e.target.classList.contains('promo-delete-btn')) {
                        openPromoModal(promo);
                    }
                };

                card.innerHTML = `
                    <button class="promo-delete-btn" style="display: ${isEditMode ? 'inline-flex' : 'none'}" onclick="deletePromo(${promo.id})">✕</button>
                    <div>
                        <span class="promo-tag">${promo.tag || 'АКЦИЯ'}</span>
                        <h4 class="promo-title">${promo.title}</h4>
                    </div>
                    <div class="promo-img-holder">
                        ${promo.image ? `<img src="${promo.image}">` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openPromoModal(promo) {
            document.getElementById('modalCategory').innerText = "СПЕЦПРЕДЛОЖЕНИЕ";
            document.getElementById('modalTitle').innerText = promo.title;
            
            const modalPrice = document.getElementById('modalPrice');
            modalPrice.innerText = promo.tag; 
            modalPrice.contentEditable = false;
            
            const fullDescBox = document.getElementById('modalFullDesc');
            fullDescBox.innerText = promo.fullDesc || "Подробности акции уточняйте у менеджеров.";
            fullDescBox.contentEditable = isEditMode;
            fullDescBox.onblur = () => {
                const target = promos.find(p => p.id === promo.id);
                if(target) { target.fullDesc = fullDescBox.innerText; saveData(); }
            };

            document.getElementById('modalImageContainer').innerHTML = promo.image 
                ? `<img src="${promo.image}">` 
                : `<div class="no-image-placeholder" style="font-size:5rem;">🎁</div>`;
                
            document.getElementById('modalAddToCartBtn').style.display = "none";
            document.getElementById('productModal').classList.add('active');
        }

        function addNewPromo() {
            const title = document.getElementById('newPromoTitle').value;
            const tag = document.getElementById('newPromoTag').value;
            const fullDesc = document.getElementById('newPromoFullDesc').value;
            if(!title) return alert("Введите заголовок акции");

            promos.push({ id: Date.now(), title, tag, fullDesc, image: tempPromoImage });
            saveData();
            renderPromos();

            document.getElementById('newPromoTitle').value = '';
            document.getElementById('newPromoTag').value = '';
            document.getElementById('newPromoFullDesc').value = '';
            document.getElementById('promoFileStatus').innerText = '';
            tempPromoImage = "";
        }

        function deletePromo(id) {
            promos = promos.filter(p => p.id !== id);
            saveData();
            renderPromos();
        }

        /* --- КАТЕГОРИИ И ТОВАРЫ --- */
        function renderCategories() {
            const container = document.getElementById('categoriesBox');
            const select = document.getElementById('newProdCat');
            container.innerHTML = ''; select.innerHTML = '';

            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `category-tab ${currentFilter === cat ? 'active' : ''}`;
                tab.innerText = cat;
                
                if (cat !== "Все решения") {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-cat-btn'; delBtn.innerText = '✕';
                    delBtn.style.display = isEditMode ? 'inline-flex' : 'none';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteCategory(cat); };
                    tab.appendChild(delBtn);
                }

                tab.onclick = (e) => {
                    if(e.target.className !== 'delete-cat-btn') { currentFilter = cat; renderCategories(); renderProducts(); }
                };
                container.appendChild(tab);

                if(cat !== "Все решения") {
                    const opt = document.createElement('option'); opt.value = cat; opt.innerText = cat; select.appendChild(opt);
                }
            });
        }

        function deleteCategory(catName) {
            if(confirm(`Удалить категорию "${catName}"?`)) {
                categories = categories.filter(c => c !== catName);
                products.forEach(p => { if(p.category === catName) p.category = "Без категории"; });
                if(!categories.includes("Без категории")) categories.push("Без категории");
                if(currentFilter === catName) currentFilter = "Все решения";
                saveData(); renderCategories(); renderProducts();
            }
        }

        function renderProducts() {
            const container = document.getElementById('catalogBox');
            container.innerHTML = '';
            const filtered = currentFilter === "Все решения" ? products : products.filter(p => p.category === currentFilter);

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = (e) => { if(!e.target.classList.contains('btn-delete') && !e.target.hasAttribute('contenteditable')) openProductModal(p); };

                const imageContent = p.image ? `<img src="${p.image}">` : `<div class="no-image-placeholder">📦</div>`;

                card.innerHTML = `
                    <div class="card-admin-actions" style="display: ${isEditMode ? 'flex' : 'none'}">
                        <button class="btn-action btn-delete" onclick="deleteProduct(${p.id})">✕</button>
                    </div>
                    <div class="product-preview-box">${imageContent}</div>
                    <h4 class="product-title" contenteditable="${isEditMode}" onclick="event.stopPropagation()" onblur="updateProductText(${p.id}, 'name', this.innerText)">${p.name}</h4>
                    <p class="product-desc" contenteditable="${isEditMode}" onclick="event.stopPropagation()" onblur="updateProductText(${p.id}, 'desc', this.innerText)">${p.desc}</p>
                    <div class="product-meta">
                        <span class="product-price" contenteditable="${isEditMode}" onclick="event.stopPropagation()" onblur="updateProductPriceInline(${p.id}, this)">${p.price}</span>
                        <button class="btn" style="padding:0.4rem 0.8rem; font-size:0.8rem;" onclick="event.stopPropagation(); addToCart(${p.id})">В корзину</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openProductModal(product) {
            currentlyOpenedProductId = product.id;
            document.getElementById('modalCategory').innerText = product.category;
            document.getElementById('modalTitle').innerText = product.name;
            
            const modalPrice = document.getElementById('modalPrice');
            modalPrice.innerText = product.price;
            modalPrice.contentEditable = isEditMode;
            modalPrice.onblur = () => {
                let formatted = formatNumberToKZT(modalPrice.innerText);
                modalPrice.innerText = formatted;
                updateProductText(currentlyOpenedProductId, 'price', formatted);
                renderProducts();
            };
            
            const fullDescBox = document.getElementById('modalFullDesc');
            fullDescBox.innerText = product.fullDesc || "Описание отсутствует.";
            fullDescBox.contentEditable = isEditMode;
            fullDescBox.onblur = () => updateProductText(currentlyOpenedProductId, 'fullDesc', fullDescBox.innerText);

            document.getElementById('modalImageContainer').innerHTML = product.image ? `<img src="${product.image}">` : `<div class="no-image-placeholder" style="font-size:5rem;">📦</div>`;
            
            const cartBtn = document.getElementById('modalAddToCartBtn');
            cartBtn.style.display = "block";
            cartBtn.onclick = () => { addToCart(product.id); document.getElementById('productModal').classList.remove('active'); };
            
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal(e) { if(e.target.classList.contains('modal-overlay')) document.getElementById('productModal').classList.remove('active'); }
        function updateProductPriceInline(id, element) { let formatted = formatNumberToKZT(element.innerText); element.innerText = formatted; updateProductText(id, 'price', formatted); }
        
        function addNewProduct() {
            const name = document.getElementById('newProdName').value;
            const desc = document.getElementById('newProdDesc').value;
            let price = document.getElementById('newProdPrice').value;
            const category = document.getElementById('newProdCat').value;
            const fullDesc = document.getElementById('newProdFullDesc').value;

            if(!name || !price) return alert("Заполните имя и цену");
            if(!price.includes('₸')) price = formatNumberToKZT(price);

            products.push({ id: Date.now(), name, desc, price, category, fullDesc: fullDesc || desc, image: tempProductImage });
            saveData(); renderProducts();

            document.getElementById('newProdName').value = ''; document.getElementById('newProdDesc').value = '';
            document.getElementById('newProdPrice').value = ''; document.getElementById('newProdFullDesc').value = '';
            document.getElementById('fileStatus').innerText = ''; tempProductImage = "";
        }

        function addNewCategoryPrompt() {
            const name = prompt("Название категории:");
            if(name && !categories.includes(name)) { categories.push(name); saveData(); renderCategories(); }
        }

        function deleteProduct(id) { products = products.filter(p => p.id !== id); saveData(); renderProducts(); }
        function updateProductText(id, field, value) { const prod = products.find(p => p.id === id); if(prod) { prod[field] = value; saveData(); } }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') document.getElementById('productModal').classList.remove('active'); });

        // Старт приложения
        renderCategories();
        renderProducts();
        renderPromos();
        updateCartCounter();
    </script>
</body>
</html>
